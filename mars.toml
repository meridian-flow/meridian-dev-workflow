[package]
name = "meridian-dev-workflow"
version = "0.0.19"
description = "Opinionated dev team for Meridian — architects, coders, reviewers, testers, and the skills that coordinate them."

[dependencies.meridian-base]
url = "https://github.com/meridian-flow/meridian-base"

[dependencies.anthropic-skills]
url = "https://github.com/anthropics/skills"
skills = ["frontend-design"]

[dependencies.caveman]
url = "https://github.com/JuliusBrussee/caveman"
skills = ["caveman"]

[settings]
models_cache_ttl_hours = 24

[models.opus]
harness = "claude"
description = "Strong orchestrator. Creative but can hallucinate. Best for orchestration, architecture, and design exploration."
provider = "anthropic"
match = ["*opus*"]
exclude = ["*:*"]

[models.sonnet]
harness = "claude"
description = "Balanced performance and cost. Good general-purpose model."
provider = "anthropic"
match = ["*sonnet*"]
exclude = ["*:*"]

[models.haiku]
harness = "claude"
provider = "anthropic"
match = ["*haiku*"]
exclude = ["*:*"]

[models.mini]
harness = "codex"
description = "Fast and cheap. Good for bulk exploration and simple tasks."
provider = "openai"
match = ["gpt-*-mini"]
exclude = ["*-nano"]

[models.codex]
harness = "codex"
description = "Default backend implementer. Fast, token-efficient, faithful to instructions. Weak at frontend."
provider = "openai"
match = ["gpt-*-codex"]
exclude = [
    "*-mini",
    "*-spark",
    "*-max",
]

[models.gpt]
harness = "codex"
description = "Strongest generalist. Best for review, verification, security, and architectural judgment."
provider = "openai"
match = ["gpt-5*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]

[models.gpt52]
harness = "codex"
description = "Extremely thorough reviewer, but slow."
provider = "openai"
match = ["gpt-5.2*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]

[models.gemini]
harness = "opencode"
description = "Large context window. Best for multimodal tasks."
provider = "google"
match = [
    "gemini*",
    "*pro*",
]
exclude = ["*-customtools"]
